name: Publish Docs to Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/publish_wiki.yml'
      - '.github/scripts/publish_wiki.py'
  workflow_dispatch:

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout Wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Flatten and Rewrite Links
        run: |
          python main-repo/.github/scripts/publish_wiki.py main-repo/docs wiki-repo

      - name: Commit and Push Changes to Wiki
        run: |
          cd wiki-repo
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          
          # Check if there are changes before committing
          if git diff-index --quiet HEAD; then
            echo "No changes in documentation to publish."
          else
            git commit -m "docs: auto-publish documentation from main repository"
            # Attempt to push to master or main depending on wiki repository default branch
            git push origin HEAD:master || git push origin HEAD:main
          fi
